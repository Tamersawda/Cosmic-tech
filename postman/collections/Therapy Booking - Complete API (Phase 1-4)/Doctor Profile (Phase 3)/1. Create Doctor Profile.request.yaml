$kind: http-request
description: Create a new doctor profile
url: "{{baseUrl}}/api/doctor-profile"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{doctorToken}}
body:
  type: text
  content: |-
    {
      "specialization": "Child Psychology",
      "bio": "Experienced psychologist specializing in child behavioral issues",
      "license_number": "LP-12345-2020",
      "experience_years": 8,
      "phone": "+1-555-0100",
      "office_address": "123 Medical Plaza, Suite 101, New York, NY 10001",
      "consultation_fee": 150.00,
      "consultation_duration_minutes": 60
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.success && jsonData.data) {
          pm.collectionVariables.set("doctorProfileId", jsonData.data.id);
      }
    language: text/javascript
order: 1000
