$kind: http-request
description: "Register a new doctor account. Returns user ID and email. OTP will
  be sent to email. Note: Tokens are NOT returned at registration - email must
  be verified first."
url: "{{baseUrl}}/api/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "doctor_{{$timestamp}}@example.com",
      "password": "DocPassword123!",
      "userType": "doctor",
      "fullName": "Dr. Alice Smith"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.success && jsonData.data) {
          pm.collectionVariables.set("doctorId", jsonData.data.id);
          pm.collectionVariables.set("doctorEmail", jsonData.data.email);
          console.log('Doctor registered. Email: ' + jsonData.data.email);
      }
    language: text/javascript
examples: ./.resources/1. Register Doctor.resources/examples
order: 1000
