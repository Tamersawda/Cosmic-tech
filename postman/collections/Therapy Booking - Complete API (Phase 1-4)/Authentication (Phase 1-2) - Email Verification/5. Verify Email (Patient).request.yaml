$kind: http-request
description: Verify patient email with OTP. OTP is sent to email after
  registration. Must be verified before login is allowed.
url: "{{baseUrl}}/api/auth/verify-email"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{patientEmail}}",
      "otp": "123456"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.success) {
          console.log('Patient email verified successfully');
      }
    language: text/javascript
order: 5000
