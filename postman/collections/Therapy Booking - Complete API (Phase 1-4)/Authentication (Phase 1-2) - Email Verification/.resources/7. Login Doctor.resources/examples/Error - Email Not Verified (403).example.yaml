$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "{{doctorEmail}}",
        "password": "DocPassword123!"
      }
response:
  statusCode: 403
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": false,
        "message": "Email not verified",
        "error": "EMAIL_NOT_VERIFIED"
      }
order: 2000
