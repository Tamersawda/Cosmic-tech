$kind: http-request
description: Verify doctor email with OTP. OTP is sent to email after
  registration. Must be verified before login is allowed.
url: "{{baseUrl}}/api/auth/verify-email"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{doctorEmail}}",
      "otp": "123456"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.success) {
          console.log('Email verified successfully');
      }
    language: text/javascript
examples: ./.resources/2. Verify Email (Doctor).resources/examples
order: 2000
