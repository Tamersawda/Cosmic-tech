$kind: http-request
description: Resend OTP to doctor email. Use this if OTP expires or user didn't receive it.
url: "{{baseUrl}}/api/auth/resend-otp"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{doctorEmail}}"
    }
examples: ./.resources/3. Resend OTP (Doctor).resources/examples
order: 3000
