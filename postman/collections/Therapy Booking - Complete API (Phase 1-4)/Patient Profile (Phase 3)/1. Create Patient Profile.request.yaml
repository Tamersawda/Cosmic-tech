$kind: http-request
description: Create a new patient profile
url: "{{baseUrl}}/api/patient-profile"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{patientToken}}
body:
  type: text
  content: |-
    {
      "date_of_birth": "1995-05-15",
      "gender": "Male",
      "phone": "+1-555-0101",
      "address": "456 Oak Street, Brooklyn, NY 11201",
      "emergency_contact_name": "Jane Doe",
      "emergency_contact_phone": "+1-555-0102",
      "medical_history": "Anxiety disorder, previously treated with therapy",
      "current_medications": "Sertraline 50mg daily"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.success && jsonData.data) {
          pm.collectionVariables.set("patientProfileId", jsonData.data.id);
      }
    language: text/javascript
order: 1000
